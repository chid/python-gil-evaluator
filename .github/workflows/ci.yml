name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13t"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest

  evaluate_runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime_label: py312
            python-version: "3.12"
          - runtime_label: py313t
            python-version: "3.13t"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev --extra scientific --extra web --extra infra
      - run: >-
          uv run gil-eval
          --runtimes ${{ matrix.runtime_label }}
          --runtime-exec ${{ matrix.runtime_label }}=python
          --libraries-file configs/priority_libraries.txt
          --disable-history
          --json-out artifacts/gil_eval_${{ matrix.runtime_label }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: gil-eval-${{ matrix.runtime_label }}
          path: artifacts/gil_eval_${{ matrix.runtime_label }}.json

  aggregate_and_report:
    runs-on: ubuntu-latest
    needs: evaluate_runtime
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --extra dev
      - uses: actions/download-artifact@v4
        with:
          name: gil-eval-py312
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: gil-eval-py313t
          path: artifacts/
      - run: >-
          uv run python scripts/aggregate_reports.py
          --inputs artifacts/gil_eval_py312.json,artifacts/gil_eval_py313t.json
          --json-out artifacts/gil_eval_combined.json
          --markdown-out artifacts/gil_eval_summary.md
      - uses: actions/upload-artifact@v4
        with:
          name: gil-eval-combined
          path: |
            artifacts/gil_eval_combined.json
            artifacts/gil_eval_summary.md
      - if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('artifacts/gil_eval_summary.md', 'utf8');
            const marker = '<!-- gil-eval-summary -->';
            const fullBody = `${marker}\n${body}`;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: fullBody,
              });
            }
